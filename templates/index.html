<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ViraAkbar.AI — Asisten AI Minimalis & Premium">
    <title>ViraAkbar.AI</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Marked.js and Highlight.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="btn-icon" id="btnToggleSidebar" title="Tutup Sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
            </div>
            
            <button class="btn-new-chat" id="btnNewChat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Chat
            </button>
            
            <div class="history-list" id="historyList">
                <p class="history-title">History</p>
                <!-- History items would go here in the future -->
            </div>
            
            <div class="sidebar-footer">
                <button class="btn-theme" id="btnThemeToggle">
                    <span class="icon-light">☀️ Light Mode</span>
                    <span class="icon-dark">🌙 Dark Mode</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header (Visible when sidebar is closed) -->
            <header class="top-header">
                <button class="btn-icon" id="btnOpenSidebar" title="Buka Sidebar" style="display: none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="brand">ViraAkbar.AI</div>
            </header>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-logo">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 12 2.1 7.1"></path><path d="M12 12l9.9 4.9"></path></svg>
                    </div>
                    <h1>Apa yang bisa saya bantu hari ini?</h1>
                </div>
                
                <!-- Messages -->
                <div class="messages-container" id="messagesContainer"></div>
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-box">
                    <textarea id="chatInput" placeholder="Kirim pesan ke ViraAkbar.AI..." rows="1" autofocus></textarea>
                    <button id="btnSend" class="btn-send" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
                <div class="disclaimer">AI dapat membuat kesalahan. Harap periksa informasi penting secara mandiri.</div>
            </div>
        </main>
    </div>

    <!-- Javascript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
